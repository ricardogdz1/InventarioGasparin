      <line x1="120" y1="120" x2="120" y2="34"/>
      <line x1="120" y1="120" x2="202" y2="94"/>
      <line x1="120" y1="120" x2="171" y2="196"/>
      <line x1="120" y1="120" x2="69" y2="196"/>
      <line x1="120" y1="120" x2="38" y2="94"/>
    </g>
    <!-- Encosto -->
    <path d="M 50 158 q 70 44 140 0 l 8 26 q -78 52 -156 0 z" fill="#2e343d"/>
    <!-- Apoios de braço -->
    <rect x="26" y="86" width="26" height="74" rx="12" fill="#3a414b"/>
    <rect x="188" y="86" width="26" height="74" rx="12" fill="#3a414b"/>
    <!-- Assento -->
    <circle cx="120" cy="118" r="66" fill="url(#assento)"/>
    <circle cx="120" cy="112" r="42" fill="#2e343d" opacity="0.55"/>
    <path d="M 86 92 a 46 46 0 0 1 68 0" fill="none" stroke="#59636f" stroke-width="5" opacity="0.6"/>
