<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="assento" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4d5560"/>
      <stop offset="1" stop-color="#343b44"/>
    </linearGradient>
    <filter id="sombra" x="-30%" y="-30%" width="170%" height="170%">
      <feDropShadow dx="8" dy="10" stdDeviation="7" flood-color="#2a2118" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#sombra)">
    <!-- Base em estrela (rodízios) -->
